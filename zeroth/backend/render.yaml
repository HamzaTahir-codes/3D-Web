services:
  - type: web
    name: zeroth-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn zeroth_api.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "zeroth-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://zeroth.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"
